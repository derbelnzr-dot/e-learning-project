<div class="forgot-page">
  <div class="forgot-container">
    <mat-card class="forgot-card">
      <div class="forgot-header">
        <div class="forgot-logo">
          <mat-icon>lock_reset</mat-icon>
        </div>
        <h1>Forgot Password</h1>
        <p>Password reset feature is coming soon. Please contact support for assistance.</p>
      </div>
      <div class="forgot-actions">
        <a mat-raised-button color="primary" routerLink="/login" class="back-btn">
          <mat-icon>arrow_back</mat-icon> Back to Login
        </a>
        <a mat-stroked-button routerLink="/contact" class="contact-btn">
          <mat-icon>support_agent</mat-icon> Contact Support
        </a>
      </div>
    </mat-card>
  </div>
</div>
